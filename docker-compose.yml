services:
  db:
    image: postgres:16
    container_name: ${DB_CONTAINER}
    env_file:
      - .env
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./schema_corte3.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/02_procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql
      - ./backend/03_triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql
      - ./backend/04_views.sql:/docker-entrypoint-initdb.d/04_views.sql
      - ./backend/05_roles_y_permisos.sql:/docker-entrypoint-initdb.d/05_roles_y_permisos.sql
      - ./backend/06_rls.sql:/docker-entrypoint-initdb.d/06_rls.sql
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ${REDIS_CONTAINER}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./api
    container_name: ${API_CONTAINER}
    ports:
      - "${API_PORT}:3000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    volumes:
      - ./api:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: ${FRONTEND_CONTAINER}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/config.js:/usr/share/nginx/html/config.js

volumes:
  postgres_data:
  redis_data: