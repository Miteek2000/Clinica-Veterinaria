<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clínica Veterinaria</title>
<script src="config.js"></script>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  nav button { margin-right: 8px; padding: 8px 16px; cursor: pointer; }
  .screen { display: none; } .screen.active { display: block; }
  input, select { padding: 8px; margin: 4px; border: 1px solid #ccc; border-radius: 4px; }
  button.primary { background: #1D9E75; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
  .cache-hit { background: #EAF3DE; color: #27500A; }
  .cache-miss { background: #FAEEDA; color: #633806; }
</style>
</head>
<body>
<h1>Clínica Veterinaria — Sistema Seguro</h1>

<!-- PANTALLA 1: Login con selección de rol -->
<div id="screen-login" class="screen active">
  <h2>Iniciar sesión</h2>
  <div>
    <label>Usuario:
      <select id="rol-select">
        <!-- Las opciones se poblarán dinámicamente desde config.js -->
      </select>
    </label>
    <br><br>
    <button class="primary" onclick="login()">Entrar</button>
  </div>
</div>

<!-- PANTALLA 2: Búsqueda de mascotas -->
<div id="screen-mascotas" class="screen">
  <nav>
    <button onclick="show('mascotas')">Mascotas</button>
    <button onclick="show('vacunacion')">Vacunación pendiente</button>
    <button onclick="logout()">Cerrar sesión</button>
    <span id="rol-badge" style="float:right;font-size:13px;color:#666"></span>
  </nav>
  <h2>Búsqueda de mascotas</h2>
  <!-- Este input es la superficie principal para SQL injection -->
  <input type="text" id="search-input" placeholder="Nombre de mascota..." style="width:300px">
  <button class="primary" onclick="buscarMascotas()">Buscar</button>
  <div id="mascotas-result"></div>
</div>

<!-- PANTALLA 3: Vacunación pendiente (con demo de Redis) -->
<div id="screen-vacunacion" class="screen">
  <nav>
    <button onclick="show('mascotas')">Mascotas</button>
    <button onclick="show('vacunacion')">Vacunación pendiente</button>
    <button onclick="logout()">Cerrar sesión</button>
  </nav>
  <h2>Vacunación pendiente</h2>
  <button class="primary" onclick="cargarVacunacion()">Consultar</button>
  <div id="cache-badge" style="margin: 8px 0;"></div>
  <div id="vacunacion-result"></div>
</div>

<script>
// Usar configuración dinámica desde config.js
const API = window.API_URL || 'http://localhost:3000/api';

// Banner visual en la consola
console.log('');
console.log('╔═══════════════════════════════════════════════╗');
console.log('║   Frontend Clínica Veterinaria — Sistema Seguro ║');
console.log('╠═══════════════════════════════════════════════╣');
console.log('║  Frontend:  http://localhost:3001              ║');
console.log('║  API:       ' + API.padEnd(36) + '║');
console.log('╚═══════════════════════════════════════════════╝');
console.log('');

let sesion = { rol: null, vet_id: null };

// Poblar el dropdown dinámicamente desde USUARIOS
document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('rol-select');
  if (!sel) return;
  
  sel.innerHTML = '';
  window.USUARIOS.forEach((u, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = u.label;
    sel.appendChild(opt);
  });
  console.log('[INIT] Dropdown poblado con', window.USUARIOS.length, 'usuarios');
});

function login() {
  const idx = parseInt(document.getElementById('rol-select').value);
  const usuario = window.USUARIOS[idx];
  
  if (!usuario) {
    console.error('[LOGIN] Usuario no encontrado en índice:', idx);
    return;
  }
  
  sesion.rol = usuario.rol;
  sesion.vet_id = usuario.vet_id;
  
  const vetIdText = sesion.vet_id !== null ? sesion.vet_id : 'N/A';
  document.getElementById('rol-badge').textContent = `${usuario.label} | vet_id=${vetIdText}`;
  
  console.log('[LOGIN] Sesión iniciada:', sesion);
  console.log('[CONFIG] API URL:', API);
  show('mascotas');
  buscarMascotas();
}

function logout() { sesion = {}; show('login'); }

function show(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
}

async function buscarMascotas() {
  const q = document.getElementById('search-input')?.value || '';
  const params = new URLSearchParams({ q, rol: sesion.rol, vet_id: sesion.vet_id || '' });
  const url = `${API}/mascotas?${params}`;
  
  console.log('[FETCH] URL:', url);
  console.log('[SESION]', sesion);
  
  try {
    document.getElementById('mascotas-result').innerHTML = '<p>⏳ Cargando...</p>';
    
    const res = await fetch(url);
    console.log('[RESPONSE] Status:', res.status);
    
    const data = await res.json();
    console.log('[DATA]', data);

    if (!res.ok) {
      document.getElementById('mascotas-result').innerHTML = `<p style="color:red">❌ Error ${res.status}: ${data.error || 'Error desconocido'}</p>`;
      return;
    }

    if (!Array.isArray(data)) {
      document.getElementById('mascotas-result').innerHTML = `<p style="color:red">❌ Respuesta inválida (tipo: ${typeof data})</p>`;
      return;
    }

    if (data.length === 0) {
      document.getElementById('mascotas-result').innerHTML = `<p style="color:orange">⚠️ Sin resultados para "${q || 'todas las mascotas'}"</p>`;
      return;
    }

    const rows = data.map(m =>
      `<tr><td>${m.id}</td><td>${m.nombre}</td><td>${m.especie}</td><td>${m.dueno}</td></tr>`
    ).join('');
    document.getElementById('mascotas-result').innerHTML =
      `<p style="color:green">✓ ${data.length} mascota(s) encontrada(s)</p><table><tr><th>ID</th><th>Nombre</th><th>Especie</th><th>Dueño</th></tr>${rows}</table>`;
  } catch (err) {
    console.error('[ERROR]', err);
    document.getElementById('mascotas-result').innerHTML = `<p style="color:red">❌ Error de conexión: ${err.message}</p>`;
  }
}

async function cargarVacunacion() {
  const params = new URLSearchParams({ rol: sesion.rol, vet_id: sesion.vet_id || '' });
  const url = `${API}/vacunacion-pendiente?${params}`;
  
  console.log('[FETCH] Vacunacion:', url);
  
  try {
    document.getElementById('vacunacion-result').innerHTML = '<p>⏳ Cargando...</p>';
    
    const res = await fetch(url);
    const data = await res.json();
    console.log('[DATA]', data);

    if (!res.ok) {
      document.getElementById('vacunacion-result').innerHTML = `<p style="color:red">❌ Error: ${data.error}</p>`;
      return;
    }

    const badge = data.source === 'cache'
      ? `<span class="badge cache-hit">✓ CACHE HIT — Redis</span>`
      : `<span class="badge cache-miss">⚠ CACHE MISS — BD (${data.latency_ms}ms)</span>`;
    document.getElementById('cache-badge').innerHTML = badge;

    if (!Array.isArray(data.data) || data.data.length === 0) {
      document.getElementById('vacunacion-result').innerHTML = `<p style="color:orange">Sin mascotas para vacunar</p>`;
      return;
    }

    const rows = data.data.map(m =>
      `<tr><td>${m.mascota}</td><td>${m.especie}</td><td>${m.vacuna || 'Sin vacunar'}</td><td>${m.proxima_aplicacion || '—'}</td></tr>`
    ).join('');
    document.getElementById('vacunacion-result').innerHTML =
      `<table><tr><th>Mascota</th><th>Especie</th><th>Vacuna</th><th>Próxima</th></tr>${rows}</table>`;
  } catch (err) {
    console.error('[ERROR]', err);
    document.getElementById('vacunacion-result').innerHTML = `<p style="color:red">❌ Error: ${err.message}</p>`;
  }
}
</script>
</body>
</html>
