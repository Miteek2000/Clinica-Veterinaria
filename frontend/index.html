<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clínica Veterinaria</title>
<script src="config.js"></script>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  nav button { margin-right: 8px; padding: 8px 16px; cursor: pointer; }
  .screen { display: none; } .screen.active { display: block; }
  input, select { padding: 8px; margin: 4px; border: 1px solid #ccc; border-radius: 4px; }
  button.primary { background: #1D9E75; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
  .cache-hit { background: #EAF3DE; color: #27500A; }
  .cache-miss { background: #FAEEDA; color: #633806; }
</style>
</head>
<body>
<h1>Clínica Veterinaria</h1>

<!-- PANTALLA 1: Login con selección de rol -->
<div id="screen-login" class="screen active">
  <h2>Iniciar sesión</h2>
  <div>
    <label>Usuario:
      <select id="rol-select">
        <!-- Las opciones se poblarán dinámicamente desde config.js -->
      </select>
    </label>
    <br><br>
    <button class="primary" onclick="login()">Entrar</button>
  </div>
</div>

<!-- PANTALLA 2: Búsqueda de mascotas -->
<div id="screen-mascotas" class="screen">
  <nav>
    <button onclick="show('mascotas')">Mascotas</button>
    <button id="btn-vacunacion" onclick="show('vacunacion')" style="display:none">Vacunación pendiente</button>
    <button id="btn-historial" onclick="show('historial')">Historial</button>
    <button onclick="logout()">Cerrar sesión</button>
    <span id="rol-badge" style="float:right;font-size:13px;color:#666"></span>
  </nav>
  <h2>Búsqueda de mascotas</h2>
  <!-- Este input es la superficie principal para SQL injection -->
  <input type="text" id="search-input" placeholder="Nombre de mascota..." style="width:300px">
  <button class="primary" onclick="buscarMascotas()">Buscar</button>
  <div id="mascotas-result"></div>

  <div style="margin-top:1rem; padding:1rem; border:1px solid #ddd; border-radius:8px;">
    <h3>Agendar cita</h3>
    <input type="number"          id="cita-mascota-id"   placeholder="ID mascota" style="width:120px">
    <input type="number"          id="cita-vet-id"        placeholder="ID veterinario" style="width:140px">
    <span id="cita-vet-label" style="display:none; font-weight:bold; color:#1D9E75; margin-left:8px;"></span>
    <input type="datetime-local"  id="cita-fecha">
    <input type="text"            id="cita-motivo"        placeholder="Motivo" style="width:200px">
    <button class="primary" onclick="agendarCita()">Agendar</button>
    <div id="cita-result"></div>
  </div>
</div>

<!-- PANTALLA 3: Vacunación pendiente (con demo de Redis) -->
<div id="screen-vacunacion" class="screen">
  <nav>
    <button onclick="show('mascotas')">Mascotas</button>
    <button id="btn-vacunacion-2" onclick="show('vacunacion')" style="display:none">Vacunación pendiente</button>
    <button id="btn-historial-2" onclick="show('historial')" style="display:none">Historial</button>
    <button onclick="logout()">Cerrar sesión</button>
  </nav>
  <h2>Vacunación pendiente</h2>
  <button class="primary" onclick="cargarVacunacion()">Consultar</button>
  <div id="cache-badge" style="margin: 8px 0;"></div>
  <div id="vacunacion-result"></div>
</div>

<!-- PANTALLA 4: Historial de auditoría -->
<div id="screen-historial" class="screen">
  <nav>
    <button onclick="show('mascotas')">Mascotas</button>
    <button id="btn-vacunacion-3" onclick="show('vacunacion')" style="display:none">Vacunación pendiente</button>
    <button id="btn-historial-3" onclick="show('historial')" style="display:none">Historial</button>
    <button onclick="logout()">Cerrar sesión</button>
  </nav>
  <h2>Historial de auditoría</h2>
  <button class="primary" onclick="cargarHistorial()">Actualizar</button>
  <div id="historial-result"></div>
</div>

<script>
const API = window.API_URL || 'http://localhost:3000/api';
const FRONTEND_URL = window.location.protocol + '//' + window.location.host;

console.log('');
console.log('╔═══════════════════════════════════════════════╗');
console.log('║   Frontend Clínica Veterinaria — Sistema Seguro ║');
console.log('╠═══════════════════════════════════════════════╣');
console.log('║  Frontend:  ' + FRONTEND_URL.padEnd(36) + '║');
console.log('║  API:       ' + API.padEnd(36) + '║');
console.log('╚═══════════════════════════════════════════════╝');
console.log('');

let sesion = { rol: null, vet_id: null };

document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('rol-select');
  if (!sel) return;
  
  sel.innerHTML = '';
  window.USUARIOS.forEach((u, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = u.label;
    sel.appendChild(opt);
  });
  console.log('[INIT] Dropdown poblado con', window.USUARIOS.length, 'usuarios');
});

function login() {
  const idx = parseInt(document.getElementById('rol-select').value);
  const usuario = window.USUARIOS[idx];
  
  if (!usuario) {
    console.error('[LOGIN] Usuario no encontrado en índice:', idx);
    return;
  }
  
  sesion.rol = usuario.rol;
  sesion.vet_id = usuario.vet_id;
  
  const vetIdText = sesion.vet_id !== null ? sesion.vet_id : 'N/A';
  document.getElementById('rol-badge').textContent = `${usuario.label} | vet_id=${vetIdText}`;
  
  const puedeVerVacunas = sesion.rol !== 'recepcion';
  const puedeVerHistorial = sesion.rol !== 'recepcion';
  document.getElementById('btn-vacunacion').style.display = puedeVerVacunas ? 'inline-block' : 'none';
  document.getElementById('btn-vacunacion-2').style.display = puedeVerVacunas ? 'inline-block' : 'none';
  document.getElementById('btn-vacunacion-3').style.display = puedeVerVacunas ? 'inline-block' : 'none';
  document.getElementById('btn-historial').style.display = puedeVerHistorial ? 'inline-block' : 'none';
  document.getElementById('btn-historial-2').style.display = puedeVerHistorial ? 'inline-block' : 'none';
  document.getElementById('btn-historial-3').style.display = puedeVerHistorial ? 'inline-block' : 'none';
  
  const vetInput = document.getElementById('cita-vet-id');
  const vetLabel = document.getElementById('cita-vet-label');
  if (sesion.rol === 'veterinario') {
    vetInput.value = sesion.vet_id;
    vetInput.readOnly = true;
    vetInput.style.display = 'none';
    vetLabel.style.display = 'inline';
    vetLabel.textContent = usuario.label;
  } else {
    vetInput.readOnly = false;
    vetInput.style.display = 'inline-block';
    vetLabel.style.display = 'none';
  }
  
  console.log('[LOGIN] Sesión iniciada:', sesion);
  console.log('[CONFIG] API URL:', API);
  console.log('[PERMS] Puede ver vacunas:', puedeVerVacunas);
  show('mascotas');
  buscarMascotas();
}

function logout() { sesion = {}; show('login'); }

function show(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
}

async function buscarMascotas() {
  const q = document.getElementById('search-input')?.value || '';
  const params = new URLSearchParams({ q, rol: sesion.rol, vet_id: sesion.vet_id || '' });
  const url = `${API}/mascotas?${params}`;
  
  console.log('[FETCH] URL:', url);
  console.log('[SESION]', sesion);
  
  try {
    document.getElementById('mascotas-result').innerHTML = '<p>⏳ Cargando...</p>';
    
    const res = await fetch(url);
    console.log('[RESPONSE] Status:', res.status);
    
    const data = await res.json();
    console.log('[DATA]', data);

    if (!res.ok) {
      document.getElementById('mascotas-result').innerHTML = `<p style="color:red">❌ Error ${res.status}: ${data.error || 'Error desconocido'}</p>`;
      return;
    }

    if (!Array.isArray(data)) {
      document.getElementById('mascotas-result').innerHTML = `<p style="color:red">❌ Respuesta inválida (tipo: ${typeof data})</p>`;
      return;
    }

    if (data.length === 0) {
      document.getElementById('mascotas-result').innerHTML = `<p style="color:orange">⚠️ Sin resultados para "${q || 'todas las mascotas'}"</p>`;
      return;
    }

    const rows = data.map(m =>
      `<tr><td>${m.id}</td><td>${m.nombre}</td><td>${m.especie}</td><td>${m.dueno}</td></tr>`
    ).join('');
    document.getElementById('mascotas-result').innerHTML =
      `<p style="color:green">✓ ${data.length} mascota(s) encontrada(s)</p><table><tr><th>ID</th><th>Nombre</th><th>Especie</th><th>Dueño</th></tr>${rows}</table>`;
  } catch (err) {
    console.error('[ERROR]', err);
    document.getElementById('mascotas-result').innerHTML = `<p style="color:red">❌ Error de conexión: ${err.message}</p>`;
  }
}

async function cargarVacunacion() {
  const params = new URLSearchParams({ rol: sesion.rol, vet_id: sesion.vet_id || '' });
  const url = `${API}/vacunacion-pendiente?${params}`;
  
  console.log('[FETCH] Vacunacion:', url);
  
  try {
    document.getElementById('vacunacion-result').innerHTML = '<p>⏳ Cargando...</p>';
    
    const res = await fetch(url);
    const data = await res.json();
    console.log('[DATA]', data);

    if (!res.ok) {
      document.getElementById('vacunacion-result').innerHTML = `<p style="color:red">❌ Error: ${data.error}</p>`;
      return;
    }

    const badge = data.source === 'cache'
      ? `<span class="badge cache-hit">✓ CACHE HIT — Redis</span>`
      : `<span class="badge cache-miss">⚠ CACHE MISS — BD (${data.latency_ms}ms)</span>`;
    document.getElementById('cache-badge').innerHTML = badge;

    if (!Array.isArray(data.data) || data.data.length === 0) {
      document.getElementById('vacunacion-result').innerHTML = `<p style="color:orange">Sin mascotas para vacunar</p>`;
      return;
    }

    const rows = data.data.map(m =>
      `<tr><td>${m.mascota}</td><td>${m.especie}</td><td>${m.vacuna || 'Sin vacunar'}</td><td>${m.proxima_aplicacion || '—'}</td></tr>`
    ).join('');
    document.getElementById('vacunacion-result').innerHTML =
      `<table><tr><th>Mascota</th><th>Especie</th><th>Vacuna</th><th>Próxima</th></tr>${rows}</table>`;
  } catch (err) {
    console.error('[ERROR]', err);
    document.getElementById('vacunacion-result').innerHTML = `<p style="color:red">❌ Error: ${err.message}</p>`;
  }
}

function agendarCita() {
  const mascotaId = parseInt(document.getElementById('cita-mascota-id').value);
  const vetId = parseInt(document.getElementById('cita-vet-id').value);
  const fecha = document.getElementById('cita-fecha').value;
  const motivo = document.getElementById('cita-motivo').value;


  if (!mascotaId || mascotaId < 1) {
    document.getElementById('cita-result').innerHTML = '<p style="color:red">Error: ID mascota debe ser > 0</p>';
    return;
  }

  if (!vetId || vetId < 1) {
    document.getElementById('cita-result').innerHTML = '<p style="color:red">Error: ID veterinario debe ser > 0</p>';
    return;
  }

  if (!fecha) {
    document.getElementById('cita-result').innerHTML = '<p style="color:red">Error: Debe seleccionar fecha y hora</p>';
    return;
  }


  if (sesion.rol === 'veterinario' && vetId !== sesion.vet_id) {
    document.getElementById('cita-result').innerHTML = '<p style="color:red">No puedes agendar citas para otro veterinario. Solo vet_id=' + sesion.vet_id + '</p>';
    return;
  }

  const body = {
    mascota_id: mascotaId,
    veterinario_id: vetId,
    fecha_hora: fecha,
    motivo: motivo,
    rol: sesion.rol,
    vet_id: sesion.vet_id
  };

  enviarCita(body);
}

async function enviarCita(body) {
  try {
    const res = await fetch(`${API}/citas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    console.log('[CITA]', data);
    document.getElementById('cita-result').innerHTML = data.ok
      ? `<p style="color:green">✓ Cita agendada correctamente</p>`
      : `<p style="color:red">❌ ${data.error}</p>`;
  } catch (err) {
    console.error('[ERROR]', err);
    document.getElementById('cita-result').innerHTML = `<p style="color:red">❌ ${err.message}</p>`;
  }
}

async function aplicarVacuna() {
  const body = {
    mascota_id:    parseInt(document.getElementById('vac-mascota-id').value),
    vacuna_id:     parseInt(document.getElementById('vac-vacuna-id').value),
    veterinario_id: parseInt(document.getElementById('vac-vet-id').value),
    rol:    sesion.rol,
    vet_id: sesion.vet_id
  };

  try {
    const res = await fetch(`${API}/vacunas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    console.log('[VACUNA]', data);
    document.getElementById('vac-result').innerHTML = data.ok
      ? `<p style="color:green">✓ Vacuna aplicada — caché invalidado</p>`
      : `<p style="color:red">❌ ${data.error}</p>`;

    setTimeout(() => cargarVacunacion(), 500);
  } catch (err) {
    console.error('[ERROR]', err);
    document.getElementById('vac-result').innerHTML = `<p style="color:red">❌ ${err.message}</p>`;
  }
}

async function cargarHistorial() {
  const params = new URLSearchParams({ rol: sesion.rol, vet_id: sesion.vet_id || '' });
  const url = `${API}/historial?${params}`;
  
  console.log('[FETCH] Historial:', url);
  
  try {
    document.getElementById('historial-result').innerHTML = '<p>Cargando...</p>';
    
    const res = await fetch(url);
    const data = await res.json();
    console.log('[DATA]', data);

    if (!res.ok) {
      document.getElementById('historial-result').innerHTML = '<p style="color:red">Error: ' + (data.error || 'Desconocido') + '</p>';
      return;
    }

    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('historial-result').innerHTML = '<p>Sin eventos en el historial</p>';
      return;
    }

    let html = '<p style="color:green">' + data.length + ' evento(s) encontrado(s)</p>';
    html += '<table border="1" style="width:100%; margin-top:1rem;">';
    html += '<tr><th>ID</th><th>Tipo</th><th>Ref</th><th>Descripcion</th><th>Fecha</th></tr>';
    for (let i = 0; i < data.length; i++) {
      const h = data[i];
      const fecha = new Date(h.fecha).toLocaleString('es');
      html += '<tr><td>' + h.id + '</td><td>' + h.tipo + '</td><td>' + h.referencia_id + '</td><td>' + h.descripcion.substring(0, 50) + '...</td><td>' + fecha + '</td></tr>';
    }
    html += '</table>';
    document.getElementById('historial-result').innerHTML = html;
  } catch (err) {
    console.error('[ERROR]', err);
    document.getElementById('historial-result').innerHTML = '<p style="color:red">Error: ' + err.message + '</p>';
  }
}
</script>
</body>
</html>
